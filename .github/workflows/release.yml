# Release workflow.
#
# Trigger: pushing a tag matching v*.*.* (e.g. `git tag v0.2.0 && git push --tags`).
# Result:  a GitHub Release is created with the MSI attached. The updater
#          module in the running app discovers this asset via the
#          /releases/latest API and offers it to users.
#
# Version reconciliation:
#   The tag is the source of truth. If pyproject.toml or config.py don't
#   match the tag, this workflow patches them, commits the fix, and
#   force-moves the tag to the new commit — so the MSI is always built
#   from source that agrees with the release version, without requiring a
#   manual fixup push before retrying.
#
#   The commit is pushed to the branch the tag originally pointed at.
#   If the tag was on a detached HEAD (tagged a commit not on any branch),
#   the patch commit is pushed to main and the tag moved there.

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write  # required for commits, tag force-push, and gh-release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so we can determine the branch the tag is on
          # and push the fixup commit back. fetch-depth: 0 also lets
          # git describe work correctly if anything needs it.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Briefcase
        run: |
          python -m pip install --upgrade pip
          python -m pip install briefcase

      - name: Reconcile versions
        id: versions
        shell: pwsh
        run: |
          # ── Derive the target version from the tag ──────────────────────
          $tag     = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          Write-Host "Tag:     $tag"
          Write-Host "Version: $version"

          # ── Check each file ─────────────────────────────────────────────
          $pyproject_content = Get-Content pyproject.toml -Raw
          $config_content    = Get-Content src/strata/config.py -Raw

          $pyproject_ok = $pyproject_content -match ('version\s*=\s*"' + [regex]::Escape($version) + '"')
          $config_ok    = $config_content    -match ('APP_VERSION\s*=\s*"' + [regex]::Escape($version) + '"')

          if ($pyproject_ok -and $config_ok) {
            Write-Host "All versions match $version — no patch needed."
            echo "patched=false" >> $env:GITHUB_OUTPUT
            exit 0
          }

          # ── Patch mismatched files ──────────────────────────────────────
          Write-Host "Version mismatch detected — patching to $version"

          if (-not $pyproject_ok) {
            Write-Host "  Patching pyproject.toml"
            # Replace the first `version = "x.y.z"` line under [tool.briefcase]
            # Uses a non-greedy match so it only touches the project version,
            # not any dependency version pins that happen to appear in the file.
            $pyproject_content = $pyproject_content -replace `
              '(?m)^(version\s*=\s*")[^"]*(")', `
              ('${1}' + $version + '${2}')
            Set-Content pyproject.toml $pyproject_content -NoNewline
          }

          if (-not $config_ok) {
            Write-Host "  Patching src/strata/config.py"
            $config_content = $config_content -replace `
              '(?m)^(APP_VERSION\s*=\s*")[^"]*(")', `
              ('${1}' + $version + '${2}')
            Set-Content src/strata/config.py $config_content -NoNewline
          }

          # ── Verify the patches actually worked ──────────────────────────
          # Read back the files and confirm the pattern now matches.
          # If the regex didn't find the right line, the replace is a no-op
          # and we'd build with the wrong version — better to fail here.
          $pyproject_check = (Get-Content pyproject.toml -Raw) -match `
            ('version\s*=\s*"' + [regex]::Escape($version) + '"')
          $config_check = (Get-Content src/strata/config.py -Raw) -match `
            ('APP_VERSION\s*=\s*"' + [regex]::Escape($version) + '"')

          if (-not $pyproject_check) {
            Write-Error "Failed to patch pyproject.toml — check the version key format."
            exit 1
          }
          if (-not $config_check) {
            Write-Error "Failed to patch src/strata/config.py — check APP_VERSION format."
            exit 1
          }

          echo "patched=true" >> $env:GITHUB_OUTPUT
          Write-Host "Patch successful."

      - name: Commit and retag if patched
        if: steps.versions.outputs.patched == 'true'
        shell: pwsh
        run: |
          $tag     = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # ── Figure out which branch to push the fixup to ────────────────
          # `git branch -r --contains HEAD` lists all remote branches that
          # contain the current commit. We prefer main/master; fall back to
          # the first branch found; if none, push to main anyway and let
          # the repo config decide whether that's allowed.
          $branches = git branch -r --contains HEAD 2>$null |
                      ForEach-Object { $_.Trim() -replace '^origin/', '' } |
                      Where-Object { $_ -notmatch 'HEAD' }

          $target_branch = $null
          foreach ($b in @("main", "master")) {
            if ($branches -contains $b) { $target_branch = $b; break }
          }
          if (-not $target_branch -and $branches) {
            $target_branch = $branches | Select-Object -First 1
          }
          if (-not $target_branch) {
            $target_branch = "main"
            Write-Host "Tag not on any branch — pushing fixup to '$target_branch'"
          } else {
            Write-Host "Pushing fixup commit to branch '$target_branch'"
          }

          # ── Stage only the files we patched ────────────────────────────
          git add pyproject.toml src/strata/config.py

          git commit -m "chore: bump version to $version [skip ci]

          Auto-patched by release workflow: tag $tag was pushed but
          pyproject.toml and/or config.py still had the old version.
          The tag has been force-moved to this commit."

          # ── Push the fixup commit ───────────────────────────────────────
          git push origin "HEAD:refs/heads/$target_branch"

          # ── Force-move the tag to the new commit ────────────────────────
          # The tag currently points at the pre-patch commit. We need it on
          # the patched one so the release is built from correct source.
          # --force is required because the tag already exists on the remote.
          git tag --force $tag HEAD
          git push origin --force "refs/tags/$tag"

          Write-Host "Tag $tag force-moved to patched commit."

      - name: Briefcase create
        run: briefcase create windows

      - name: Briefcase build
        run: briefcase build windows

      - name: Briefcase package
        # --adhoc-sign skips code signing. Replace with proper signing config
        # once you have a code signing certificate — unsigned MSIs trigger
        # SmartScreen warnings on download.
        run: briefcase package windows --adhoc-sign

      - name: Locate MSI
        id: find_msi
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path dist -Filter *.msi -Recurse | Select-Object -First 1
          if (-not $msi) { Write-Error "No MSI produced"; exit 1 }
          # Briefcase names it like "Strata-0.1.0.msi" — keep that, the updater
          # pattern-matches on .msi extension only.
          echo "msi_path=$($msi.FullName)" >> $env:GITHUB_OUTPUT
          echo "msi_name=$($msi.Name)" >> $env:GITHUB_OUTPUT

      - name: Install git-cliff
        shell: pwsh
        run: |
          $version = "2.8.0"
          $url = "https://github.com/orhun/git-cliff/releases/download/v$version/git-cliff-$version-x86_64-pc-windows-msvc.zip"
          Invoke-WebRequest $url -OutFile git-cliff.zip
          Expand-Archive git-cliff.zip -DestinationPath git-cliff-bin
          echo "$PWD\git-cliff-bin" >> $env:GITHUB_PATH

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_msi.outputs.msi_path }}
          name: ${{ github.ref_name }}
          body: ${{ steps.cliff.outputs.content }}
          draft: false
          prerelease: false
